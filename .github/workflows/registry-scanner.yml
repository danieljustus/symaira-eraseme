name: Registry Scanner

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create PR if changes found'
        required: false
        default: true
        type: boolean

env:
  CI: true

jobs:
  scan-registries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyyaml requests
    
    - name: Download and scan registries
      id: scan
      run: |
        python scripts/registry_sync.py --scan-all --output /tmp/scan_results.json
        echo "scan_results=$(cat /tmp/scan_results.json | jq -c .)" >> $GITHUB_OUTPUT
        
        # Check if new brokers were found
        NEW_COUNT=$(cat /tmp/scan_results.json | jq '.new_brokers | length')
        echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
        
        if [ "$NEW_COUNT" -gt 0 ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Generate broker YAMLs from scan
      if: steps.scan.outputs.has_changes == 'true'
      run: |
        python scripts/registry_sync.py --generate-yaml --input /tmp/scan_results.json --output-dir registry/brokers/us
    
    - name: Validate generated YAMLs
      if: steps.scan.outputs.has_changes == 'true'
      run: |
        pip install jsonschema
        python scripts/registry_sync.py --validate-all
    
    - name: Create Pull Request
      if: steps.scan.outputs.has_changes == 'true' && github.event.inputs.create_pr != 'false'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: auto/registry-update-${{ github.run_number }}
        base: ${{ github.event.repository.default_branch }}
        title: 'Registry Update: Add ${{ steps.scan.outputs.new_count }} new data brokers'
        body: |
          ## Automated Registry Update
          
          This PR was automatically generated by the Registry Scanner workflow.
          
          ### Changes
          - **New brokers found:** ${{ steps.scan.outputs.new_count }}
          - **Scan date:** ${{ github.event.repository.updated_at }}
          - **Sources:** California Data Broker Registry, Vermont Data Broker Registry
          
          ### Sources
          - [California Data Broker Registry](https://cppa.ca.gov/data-brokers/)
          - [Vermont Data Broker Registry](https://scc.vermont.gov/data-broker-registry)
          
          ### Verification
          - [ ] All new brokers validated against schema
          - [ ] No duplicates with existing entries
          - [ ] Sources are verifiable
          
          ---
          *This is an automated PR. Please review before merging.*
        commit-message: 'registry: add ${{ steps.scan.outputs.new_count }} new data brokers from state registries'
        committer: 'Symaira EraseMe Bot <bot@symeraseme.dev>'
        author: 'Symaira EraseMe Bot <bot@symeraseme.dev>'
        labels: |
          registry-update
          automated
    
    - name: Create Issue if scan failed
      if: failure()
      uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Registry Scanner Failed',
            body: `The weekly registry scanner failed on ${new Date().toISOString()}.\n\nPlease check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}).`,
            labels: ['bug', 'registry', 'automated']
          });
