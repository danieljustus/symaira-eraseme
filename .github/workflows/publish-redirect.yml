name: Publish Redirect Package to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the redirect package (e.g. 0.1.3)'
        required: true
        default: '0.1.3'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & publish openeraseme redirect
    runs-on: ubuntu-latest
    environment:
      name: pypi-openeraseme
      url: https://pypi.org/p/openeraseme
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "latest"

      - name: Build redirect package
        working-directory: redirect/openeraseme
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
        with:
          packages-dir: redirect/openeraseme/dist
