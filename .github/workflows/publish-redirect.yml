name: Publish Redirect Package to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the redirect package (e.g. 0.1.3)'
        required: true
        default: '0.1.3'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & publish openeraseme redirect
    runs-on: ubuntu-latest
    environment:
      name: pypi-openeraseme
      url: https://pypi.org/p/openeraseme
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: Build redirect package
        working-directory: redirect/openeraseme
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
        with:
          packages-dir: redirect/openeraseme/dist
