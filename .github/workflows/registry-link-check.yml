name: Registry Link Check

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Check broker website URLs
        run: |
          uv run python -c "
          import sys, time
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          import yaml

          urls = []
          for yml in sorted(Path('registry/brokers').rglob('*.yaml')):
              with open(yml) as f:
                  data = yaml.safe_load(f)
              url = data.get('website', '')
              name = data.get('name', yml.stem)
              urls.append((name, url))

          errors: list[str] = []
          checked = 0

          def check(name: str, url: str) -> tuple[str, str, str]:
              try:
                  req = Request(url, method='HEAD')
                  req.add_header('User-Agent', 'Symaira EraseMe-LinkCheck/0.1')
                  urlopen(req, timeout=10)
                  return (name, 'ok', f'  \u2713 {name} \u2014 {url}')
              except HTTPError as e:
                  if e.code == 403:
                      return (name, 'skip', f'  ~ {name} \u2014 {url} (HTTP {e.code}, skipping)')
                  return (name, 'err', f'{name}: HTTP {e.code} \u2014 {url}')
              except (URLError, ValueError, OSError) as e:
                  return (name, 'err', f'{name}: {e} \u2014 {url}')

          with ThreadPoolExecutor(max_workers=30) as executor:
              futures = {executor.submit(check, n, u): n for n, u in urls}
              for future in as_completed(futures):
                  name, status, msg = future.result()
                  checked += 1
                  print(msg)
                  if status == 'err':
                      errors.append(msg)
                  if checked % 50 == 0:
                      time.sleep(0.2)

          if errors:
              print(f'\n{len(errors)} link(s) failed:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          "
