name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Ruff lint
        run: uv run ruff check src/symeraseme/
      - name: Ruff format check
        run: uv run ruff format --check src/symeraseme/
      - name: MyPy type check
        run: uv run mypy src/symeraseme/
      - name: Check for raw typer.echo error emissions
        run: |
          if grep -rn 'typer\.echo.*err=True' src/symeraseme/services/; then
            echo "ERROR: Found raw typer.echo error emissions. Use render_error() or print_error() instead."
            exit 1
          fi
          echo "OK: No raw typer.echo error emissions found."
      - name: Check render_error() terminal placement
        run: uv run python scripts/check_render_error_terminal.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run tests
        run: uv run pytest --verbose --tb=short

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run tests
        run: uv run pytest --verbose --tb=short
      - name: Verify CLI loads on macOS
        run: uv run symeraseme --help

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Validate registry YAMLs against schema
        run: |
          uv run python -c "
          import yaml, json, jsonschema, sys
          from pathlib import Path

          schema_path = Path('registry/schemas/broker.schema.json')
          if schema_path.exists():
              with open(schema_path) as f:
                  schema = json.load(f)
              for yml in Path('registry/brokers').rglob('*.yaml'):
                  if yml.name.startswith('_'):
                      continue
                  with open(yml) as f:
                      data = yaml.safe_load(f)
                  try:
                      jsonschema.validate(data, schema)
                      print(f'  ✓ {yml}')
                  except jsonschema.ValidationError as e:
                      print(f'  ✗ {yml}: {e.message}')
                      sys.exit(1)
                  broker_id = data.get('id', '')
                  stem = yml.stem
                  if broker_id and broker_id != stem:
                      print(f'  ✗ {yml}: id={broker_id!r} != stem={stem!r}')
                      sys.exit(1)
          else:
              print('  Schema not yet created — skipping validation')
          "

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          path: ./
