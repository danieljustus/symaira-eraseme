name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Ruff lint
        run: uv run ruff check src/symeraseme/
      - name: Ruff format check
        run: uv run ruff format --check src/symeraseme/
      - name: MyPy type check
        run: uv run mypy src/symeraseme/
      - name: Check for raw typer.echo error emissions
        run: |
          if grep -rn 'typer\.echo.*err=True' src/symeraseme/services/; then
            echo "ERROR: Found raw typer.echo error emissions. Use render_error() or print_error() instead."
            exit 1
          fi
          echo "OK: No raw typer.echo error emissions found."
      - name: Check render_error() terminal placement
        run: uv run python scripts/check_render_error_terminal.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run tests
        run: uv run pytest --verbose --tb=short

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Validate registry YAMLs against schema
        run: |
          uv run python -c "
          import yaml, json, jsonschema, sys
          from pathlib import Path

          schema_path = Path('registry/schemas/broker.schema.json')
          if schema_path.exists():
              with open(schema_path) as f:
                  schema = json.load(f)
              for yml in Path('registry/brokers').rglob('*.yaml'):
                  if yml.name.startswith('_'):
                      continue
                  with open(yml) as f:
                      data = yaml.safe_load(f)
                  try:
                      jsonschema.validate(data, schema)
                      print(f'  ✓ {yml}')
                  except jsonschema.ValidationError as e:
                      print(f'  ✗ {yml}: {e.message}')
                      sys.exit(1)
                  broker_id = data.get('id', '')
                  stem = yml.stem
                  if broker_id and broker_id != stem:
                      print(f'  ✗ {yml}: id={broker_id!r} != stem={stem!r}')
                      sys.exit(1)
          else:
              print('  Schema not yet created — skipping validation')
          "

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          extra_args: --only-verified
