id: acxiom-us
name: Acxiom (US)
website: https://www.acxiom.com
category: marketing
jurisdictions:
  - US
laws:
  - CCPA
data_sensitivity: 5
priority: high

opt_out:
  - type: email
    endpoint: privacy@acxiom.com
    template: ccpa-deletion
    locale: en
    required_fields:
      - full_name
      - email
      - address
    supports_suppression: true
    expected_response_days: 45

verification:
  ack_keywords:
    - "received"
    - "request id"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "additional information"
