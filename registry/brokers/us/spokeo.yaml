id: spokeo
name: Spokeo
website: https://www.spokeo.com
category: people-search
jurisdictions:
  - US
laws:
  - CCPA
data_sensitivity: 4
priority: high

opt_out:
  - type: web_form
    url: https://www.spokeo.com/optout
    form_spec:
      steps:
        - goto: .
        - fill:
            "#first_name": "${full_name}"
            "#email": "${email}"
        - click: "#submit-btn"
        - wait_for: ".confirmation"
        - screenshot: "result"
      timeout_seconds: 45.0
      rate_limit_delay: 2.0

verification:
  ack_keywords:
    - "submitted"
    - "request received"
  rejection_keywords:
    - "already removed"
    - "not found"
  human_required_keywords:
    - "verify"
    - "additional information"
