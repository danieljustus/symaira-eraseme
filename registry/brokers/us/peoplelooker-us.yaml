id: peoplelooker-us
name: PeopleLooker
website: https://www.peoplelooker.com
category: people-search
jurisdictions:
- US
laws:
- CCPA
data_sensitivity: 4
priority: medium
opt_out:
- type: web_form
  url: https://www.peoplelooker.com/opt-out
  form_spec:
    steps:
    - goto: .
    - fill:
        '#first_name': ${first_name}
        '#last_name': ${last_name}
        '#state': ${state}
        '#email': ${email}
    - click: button[type=submit]
    - wait_for: .success
    - screenshot: result
    timeout_seconds: 45.0
    rate_limit_delay: 2.0
verification:
  ack_keywords:
  - opt-out
  - request received
  - confirmation
  rejection_keywords:
  - not found
  human_required_keywords:
  - verify identity
added_date: '2025-05-21'
status: active
