id: peekyou-us
name: PeekYou
website: https://www.peekyou.com
category: people-search
jurisdictions:
- US
laws:
- CCPA
data_sensitivity: 3
priority: medium
opt_out:
- type: web_form
  url: https://www.peekyou.com/about/contact/optout/
  form_spec:
    steps:
    - goto: .
    - fill:
        input[name=first_name]: ${first_name}
        input[name=last_name]: ${last_name}
        input[name=email]: ${email}
    - click: button[type=submit]
    - wait_for: .confirmation
    - screenshot: result
    timeout_seconds: 45.0
    rate_limit_delay: 2.0
verification:
  ack_keywords:
  - opt-out
  - request received
  rejection_keywords:
  - not found
  human_required_keywords:
  - manual review
added_date: '2025-05-21'
status: active
