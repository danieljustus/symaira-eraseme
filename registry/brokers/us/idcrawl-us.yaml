id: idcrawl-us
name: IDCrawl
website: https://www.idcrawl.com
category: people-search
jurisdictions:
- US
laws:
- CCPA
data_sensitivity: 3
priority: low
opt_out:
- type: web_form
  url: https://www.idcrawl.com/opt-out
  form_spec:
    steps:
    - goto: .
    - fill:
        input[name=name]: ${full_name}
        input[name=email]: ${email}
    - click: button[type=submit]
    - wait_for: .success
    - screenshot: result
    timeout_seconds: 45.0
    rate_limit_delay: 2.0
verification:
  ack_keywords:
  - opt-out
  - removed
  - submitted
  rejection_keywords:
  - not found
  human_required_keywords:
  - contact us
added_date: '2025-05-21'
status: active
