id: lifesight-eu
name: Lifesight Pte Ltd (Eyeota)
website: https://www.lifesight.io
category: analytics
jurisdictions:
  - CH
  - EU
laws:
  - GDPR
data_sensitivity: 4
priority: medium

opt_out:
  - type: email
    endpoint: privacy@lifesight.io
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "acknowledge"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "identity verification"
