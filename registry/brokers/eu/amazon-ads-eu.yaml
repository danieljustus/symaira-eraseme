id: amazon-ads-eu
name: Amazon Europe Core SARL (Advertising Data)
website: https://www.amazon.com
category: marketing
jurisdictions:
  - LU
  - DE
  - EU
laws:
  - GDPR
data_sensitivity: 4
priority: high

opt_out:
  - type: email
    endpoint: privacy@amazon.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "request id"
  rejection_keywords:
    - "unable to verify"
    - "additional verification"
  human_required_keywords:
    - "additional verification"
