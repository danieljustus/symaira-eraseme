id: google-ads-eu
name: Google Ireland Limited (Advertising Profile)
website: https://www.google.com
category: marketing
jurisdictions:
  - IE
  - EU
laws:
  - GDPR
data_sensitivity: 5
priority: high

opt_out:
  - type: email
    endpoint: privacy@google.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "request id"
  rejection_keywords:
    - "cannot verify"
    - "additional information required"
  human_required_keywords:
    - "manual review"
