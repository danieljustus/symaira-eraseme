id: tapad-eu
name: Tapad Norway AS
website: https://www.tapad.com
category: marketing
jurisdictions:
  - "NO"
  - EU
laws:
  - GDPR
data_sensitivity: 4
priority: medium

opt_out:
  - type: email
    endpoint: privacy@tapad.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "request id"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "additional documentation"
