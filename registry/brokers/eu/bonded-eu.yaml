id: bonded-eu
name: Bonded Intelligence Limited
website: https://www.bonded.com
category: analytics
jurisdictions:
  - UK
  - EU
laws:
  - GDPR
data_sensitivity: 4
priority: medium

opt_out:
  - type: email
    endpoint: privacy@bonded.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "acknowledge"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "identity verification"
