id: criteo-eu
name: Criteo SA
website: https://www.criteo.com
category: marketing
jurisdictions:
  - FR
  - EU
laws:
  - GDPR
data_sensitivity: 5
priority: high

opt_out:
  - type: email
    endpoint: privacy@criteo.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "request id"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "identity verification"
