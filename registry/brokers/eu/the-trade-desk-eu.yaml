id: the-trade-desk-eu
name: The Trade Desk (UK) Limited
website: https://www.thetradedesk.com
category: marketing
jurisdictions:
  - UK
  - EU
laws:
  - GDPR
data_sensitivity: 5
priority: high

opt_out:
  - type: email
    endpoint: privacy@thetradedesk.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "received"
    - "request id"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "manual review"
