<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" width="760" height="600">
  <defs>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>

  <!-- Window border -->
  <rect x="0" y="0" width="760" height="600" rx="10" ry="10" fill="url(#border)" stroke="#555" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="1" y="1" width="758" height="38" rx="9" ry="9" fill="url(#titleBar)"/>
  <rect x="1" y="20" width="758" height="19" fill="url(#titleBar)"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="380" y="25" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#aaa" text-anchor="middle">symaira-eraseme — terminal</text>

  <!-- Terminal body -->
  <rect x="1" y="39" width="758" height="560" rx="0" ry="0" fill="url(#bg)"/>
  <rect x="1" y="39" width="758" height="551" rx="0" ry="0" clip-path="inset(0 0 9px 0)"/>
  <!-- Bottom corners -->
  <rect x="1" y="591" width="758" height="9" rx="0" ry="0" fill="url(#bg)"/>

  <!-- Content area -->
  <g font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="13">
    <!-- Line 1: prompt -->
    <text x="20" y="65" fill="#50fa7b">~</text>
    <text x="35" y="65" fill="#f8f8f2">$ </text>
    <text x="60" y="65" fill="#8be9fd">symeraseme</text>
    <text x="165" y="65" fill="#f8f8f2"> init-profile</text>

    <!-- Line 2: output -->
    <text x="20" y="85" fill="#50fa7b">✓</text>
    <text x="35" y="85" fill="#f8f8f2"> Profile saved to </text>
    <text x="190" y="85" fill="#f1fa8c">~/.config/symeraseme/profile.json</text>

    <!-- Line 3: blank -->
    <text x="20" y="105" fill="#f8f8f2"> </text>

    <!-- Line 4: prompt -->
    <text x="20" y="125" fill="#50fa7b">~</text>
    <text x="35" y="125" fill="#f8f8f2">$ </text>
    <text x="60" y="125" fill="#8be9fd">symeraseme</text>
    <text x="165" y="125" fill="#f8f8f2"> brokers list </text>
    <text x="266" y="125" fill="#bd93f9">--jurisdiction</text>
    <text x="367" y="125" fill="#f8f8f2"> GDPR</text>

    <!-- Table header -->
    <text x="20" y="150" fill="#6272a4">┏━━━━━━━━━━━━━━━━━━┳━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┳━━━━━━━━━━━━━━━┓</text>
    <text x="20" y="170" fill="#6272a4">┃</text>
    <text x="25" y="170" fill="#ffb86c" font-weight="bold"> Name           </text>
    <text x="175" y="170" fill="#6272a4">┃</text>
    <text x="180" y="170" fill="#ffb86c" font-weight="bold"> Website                     </text>
    <text x="415" y="170" fill="#6272a4">┃</text>
    <text x="420" y="170" fill="#ffb86c" font-weight="bold"> Jurisdiction  </text>
    <text x="555" y="170" fill="#6272a4">┃</text>
    <text x="20" y="190" fill="#6272a4">┡━━━━━━━━━━━━━━━━━━╇━━━━━━━━━━━━━━━━━━━━━━━━━━━━━╇━━━━━━━━━━━━━━━┩</text>

    <!-- Table rows -->
    <text x="20" y="210" fill="#6272a4">│</text>
    <text x="25" y="210" fill="#f8f8f2"> Spokeo       </text>
    <text x="175" y="210" fill="#6272a4">│</text>
    <text x="180" y="210" fill="#8be9fd"> https://www.spokeo.com      </text>
    <text x="415" y="210" fill="#6272a4">│</text>
    <text x="420" y="210" fill="#f1fa8c"> CCPA          </text>
    <text x="555" y="210" fill="#6272a4">│</text>

    <text x="20" y="230" fill="#6272a4">│</text>
    <text x="25" y="230" fill="#f8f8f2"> Intelius     </text>
    <text x="175" y="230" fill="#6272a4">│</text>
    <text x="180" y="230" fill="#8be9fd"> https://www.intelius.com    </text>
    <text x="415" y="230" fill="#6272a4">│</text>
    <text x="420" y="230" fill="#f1fa8c"> CCPA          </text>
    <text x="555" y="230" fill="#6272a4">│</text>

    <text x="20" y="250" fill="#6272a4">│</text>
    <text x="25" y="250" fill="#f8f8f2"> Acxiom (EU)  </text>
    <text x="175" y="250" fill="#6272a4">│</text>
    <text x="180" y="250" fill="#8be9fd"> https://www.acxiom.com      </text>
    <text x="415" y="250" fill="#6272a4">│</text>
    <text x="420" y="250" fill="#50fa7b"> GDPR          </text>
    <text x="555" y="250" fill="#6272a4">│</text>

    <text x="20" y="270" fill="#6272a4">│</text>
    <text x="25" y="270" fill="#f8f8f2"> Schufa       </text>
    <text x="175" y="270" fill="#6272a4">│</text>
    <text x="180" y="270" fill="#8be9fd"> https://www.schufa.de       </text>
    <text x="415" y="270" fill="#6272a4">│</text>
    <text x="420" y="270" fill="#50fa7b"> GDPR          </text>
    <text x="555" y="270" fill="#6272a4">│</text>

    <!-- Table footer -->
    <text x="20" y="290" fill="#6272a4">└──────────────────┴─────────────────────────────┴───────────────┘</text>

    <!-- Line after table: blank -->
    <text x="20" y="315" fill="#f8f8f2"> </text>

    <!-- plan create command -->
    <text x="20" y="340" fill="#50fa7b">~</text>
    <text x="35" y="340" fill="#f8f8f2">$ </text>
    <text x="60" y="340" fill="#8be9fd">symeraseme</text>
    <text x="165" y="340" fill="#f8f8f2"> plan create </text>
    <text x="266" y="340" fill="#bd93f9">--campaign</text>
    <text x="354" y="340" fill="#f8f8f2"> initial </text>
    <text x="432" y="340" fill="#bd93f9">--jurisdiction</text>
    <text x="541" y="340" fill="#f8f8f2"> GDPR </text>
    <text x="592" y="340" fill="#bd93f9">--max</text>
    <text x="641" y="340" fill="#f8f8f2"> 5</text>

    <!-- plan create output -->
    <text x="20" y="362" fill="#50fa7b">✓</text>
    <text x="35" y="362" fill="#f8f8f2"> Plan created: </text>
    <text x="155" y="362" fill="#ffb86c">5</text>
    <text x="168" y="362" fill="#f8f8f2"> brokers selected</text>
    <text x="20" y="382" fill="#f8f8f2">  Campaign: </text>
    <text x="110" y="382" fill="#f1fa8c">initial</text>

    <!-- blank -->
    <text x="20" y="407" fill="#f8f8f2"> </text>

    <!-- status command -->
    <text x="20" y="432" fill="#50fa7b">~</text>
    <text x="35" y="432" fill="#f8f8f2">$ </text>
    <text x="60" y="432" fill="#8be9fd">symeraseme</text>
    <text x="165" y="432" fill="#f8f8f2"> status</text>

    <!-- status output -->
    <text x="20" y="454" fill="#f8f8f2">Campaign: </text>
    <text x="105" y="454" fill="#f1fa8c">initial</text>
    <text x="20" y="478" fill="#6272a4">┏━━━━━━━━━━━━━━━━━┳━━━━━━━━━━━━━━━┳━━━━━━━━━━━━━━━━━━━━━━┓</text>
    <text x="20" y="498" fill="#6272a4">┃</text>
    <text x="25" y="498" fill="#ffb86c" font-weight="bold"> Broker          </text>
    <text x="195" y="498" fill="#6272a4">┃</text>
    <text x="200" y="498" fill="#ffb86c" font-weight="bold"> Status        </text>
    <text x="355" y="498" fill="#6272a4">┃</text>
    <text x="360" y="498" fill="#ffb86c" font-weight="bold"> Deadline               </text>
    <text x="575" y="498" fill="#6272a4">┃</text>
    <text x="20" y="518" fill="#6272a4">┡━━━━━━━━━━━━━━━━━╇━━━━━━━━━━━━━━━╇━━━━━━━━━━━━━━━━━━━━━━┩</text>

    <text x="20" y="538" fill="#6272a4">│</text>
    <text x="25" y="538" fill="#f8f8f2"> Acxiom (EU)     </text>
    <text x="195" y="538" fill="#6272a4">│</text>
    <text x="200" y="538" fill="#f1fa8c"> planned       </text>
    <text x="355" y="538" fill="#6272a4">│</text>
    <text x="360" y="538" fill="#6272a4"> —                      </text>
    <text x="575" y="538" fill="#6272a4">│</text>

    <text x="20" y="558" fill="#6272a4">└─────────────────┴───────────────┴──────────────────────┘</text>

    <!-- cursor -->
    <text x="20" y="583" fill="#50fa7b">~</text>
    <text x="35" y="583" fill="#f8f8f2">$</text>
    <rect x="50" y="572" width="9" height="14" fill="#f8f8f2">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
